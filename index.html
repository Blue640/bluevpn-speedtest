<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00d1ff; --text: #ffffff; --sec: #1f262f; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .gauge { position: relative; width: 260px; height: 260px; display: flex; align-items: center; justify-content: center; border: 4px solid var(--sec); border-radius: 50%; }
        #speedText { font-size: 4.5rem; font-weight: 900; color: var(--accent); }
        .unit { color: #5a6575; font-size: 1.2rem; position: absolute; bottom: 60px; }
        .stats { display: flex; gap: 15px; margin-top: 30px; }
        .stat-card { background: var(--sec); padding: 10px 25px; border-radius: 12px; text-align: center; min-width: 100px; }
        .stat-label { font-size: 0.7rem; color: #5a6575; text-transform: uppercase; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .btn { margin-top: 40px; background: var(--accent); color: #000; border: none; padding: 18px 70px; border-radius: 35px; font-weight: 900; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .btn:disabled { background: #333; color: #666; }
        #log { margin-top: 15px; font-size: 0.7rem; color: #444; }
    </style>
</head>
<body>

    <div class="gauge">
        <span id="speedText">0.0</span>
        <div class="unit">Mbps</div>
    </div>

    <div class="stats">
        <div class="stat-card">
            <span class="stat-label">Ping</span>
            <span class="stat-val" id="p">0 <small>ms</small></span>
        </div>
        <div class="stat-card">
            <span class="stat-label">Jitter</span>
            <span class="stat-val" id="j">0 <small>ms</small></span>
        </div>
    </div>

    <button class="btn" id="go">START</button>
    <div id="log">Ready</div>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    const btn = document.getElementById('go');
    const log = document.getElementById('log');

    // Функция Пинга (уже работает, оставляем)
    async function getPing() {
        const starts = [];
        for(let i=0; i<4; i++) {
            const s = performance.now();
            await fetch("test10mb.bin", {method:'HEAD', cache:'no-store'}).catch(()=>{});
            starts.push(performance.now()-s);
        }
        return { 
            p: (starts.reduce((a,b)=>a+b)/4).toFixed(0),
            j: (Math.max(...starts)-Math.min(...starts)).toFixed(0)
        };
    }

    btn.onclick = async function() {
        btn.disabled = true;
        btn.innerText = "TESTING...";
        log.innerText = "Measuring latency...";

        const lat = await getPing();
        document.getElementById('p').innerHTML = lat.p + " <small>ms</small>";
        document.getElementById('j').innerHTML = lat.j + " <small>ms</small>";

        log.innerText = "Downloading test file...";
        
        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        
        // Используем случайный параметр против кэша
        xhr.open("GET", "test10mb.bin?v=" + Math.random(), true);
        
        xhr.onprogress = function(e) {
            if (e.lengthComputable || e.loaded > 0) {
                const now = performance.now();
                const duration = (now - startTime) / 1000;
                const mbps = ((e.loaded * 8) / (1024 * 1024) / duration).toFixed(1);
                document.getElementById('speedText').innerText = mbps;
            }
        };

        xhr.onload = function() {
            log.innerText = "Done!";
            btn.innerText = "RETRY";
            btn.disabled = false;
            if(tg) tg.HapticFeedback.notificationOccurred('success');
        };

        xhr.onerror = function() {
            log.innerText = "Error: Connection blocked";
            btn.innerText = "ERROR";
            btn.disabled = false;
        };

        xhr.send();
    };

    if(tg) { tg.expand(); tg.ready(); }
</script>
</body>
</html>
