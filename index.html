<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest Pro</title>
    <!-- Подключаем SDK Telegram для работы в Mini App -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #00d1ff;
            --text: #ffffff;
            --sec: #1f262f;
            --gray: #5a6575;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }

        /* Контейнер спидометра (Дизайн как на скрине) */
        .gauge-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Серый фоновый полукруг */
        .gauge-background {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 18px solid var(--sec);
            border-radius: 50%;
            border-bottom-color: transparent;
            top: 0;
            transform: rotate(-45deg);
        }

        /* Активная полоска прогресса */
        .gauge-progress {
            position: absolute;
            width: 280px;
            height: 280px;
            border: 18px solid var(--accent);
            border-radius: 50%;
            border-bottom-color: transparent;
            border-left-color: transparent;
            border-right-color: transparent;
            top: 0;
            transform: rotate(-135deg); /* 0 Mbps */
            transition: transform 0.4s cubic-bezier(0.1, 0.7, 1.0, 0.1);
            z-index: 2;
        }

        /* Блок с цифрами в центре */
        .speed-info {
            text-align: center;
            z-index: 10;
            margin-bottom: 5px;
        }

        #speedValue {
            font-size: 5rem;
            font-weight: 900;
            color: var(--text);
            line-height: 1;
            display: block;
        }

        .unit {
            color: var(--gray);
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Информационная панель (Сеть) */
        .network-card {
            width: 100%;
            max-width: 340px;
            background: var(--sec);
            border-radius: 24px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .label {
            color: var(--gray);
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .value {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text);
            text-align: right;
        }

        /* Кнопка Старт */
        .btn-start {
            margin-top: 40px;
            background: var(--accent);
            color: #000;
            border: none;
            width: 100%;
            max-width: 280px;
            height: 65px;
            border-radius: 35px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(0, 209, 255, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-start:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px rgba(0, 209, 255, 0.2);
        }

        .btn-start:disabled {
            background: #1f262f;
            color: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        #statusText {
            margin-top: 15px;
            font-size: 0.75rem;
            color: var(--gray);
            height: 18px;
        }
    </style>
</head>
<body>

    <div class="gauge-wrapper">
        <div class="gauge-background"></div>
        <div class="gauge-progress" id="gaugeProgress"></div>
        <div class="speed-info">
            <span id="speedValue">0.0</span>
            <div class="unit">Mbps</div>
        </div>
    </div>

    <div class="network-card">
        <div class="info-row">
            <span class="label">IP Address</span>
            <span class="value" id="userIp">Loading...</span>
        </div>
        <div class="info-row">
            <span class="label">Location</span>
            <span class="value" id="userLoc">—</span>
        </div>
        <div class="info-row">
            <span class="label">Provider</span>
            <span class="value" id="userIsp">—</span>
        </div>
    </div>

    <button class="btn-start" id="goButton">START TEST</button>
    <div id="statusText">System Ready</div>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    const speedValue = document.getElementById('speedValue');
    const gaugeProgress = document.getElementById('gaugeProgress');
    const goButton = document.getElementById('goButton');
    const statusText = document.getElementById('statusText');

    // Функция поворота стрелки: 0 Mbps = -135deg, 100 Mbps = 45deg
    function updateGauge(mbps) {
        // Ограничиваем шкалу до 100 для анимации, но цифры могут быть больше
        const limit = Math.min(mbps, 100);
        const degrees = -135 + (limit * 1.8);
        gaugeProgress.style.transform = `rotate(${degrees}deg)`;
    }

    // Получение данных о сети (HTTPS сервис)
    async function getNetworkData() {
        try {
            const response = await fetch('https://ipapi.co');
            const data = await response.json();
            
            document.getElementById('userIp').innerText = data.ip || "Unknown";
            document.getElementById('userLoc').innerText = (data.city + ', ' + data.country_code) || "Unknown";
            document.getElementById('userIsp').innerText = data.org || "Unknown ISP";
        } catch (e) {
            document.getElementById('userIp').innerText = "VPN Active";
            document.getElementById('userIsp').innerText = "Network Secure";
        }
    }

    // Основная логика теста
    goButton.onclick = function() {
        goButton.disabled = true;
        goButton.innerText = "TESTING...";
        statusText.innerText = "Downloading test.jpg...";
        speedValue.innerText = "0.0";
        updateGauge(0);

        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        let samples = [];

        // Используем твой файл test.jpg
        xhr.open("GET", "test.jpg?nocache=" + Date.now(), true);
        
        xhr.onprogress = function(e) {
            if (e.loaded > 0) {
                const now = performance.now();
                const durationSeconds = (now - startTime) / 1000;
                
                // Расчет скорости в Мегабитах
                const currentMbps = ((e.loaded * 8) / (1024 * 1024) / durationSeconds);
                
                // Усреднение для плавности
                samples.push(currentMbps);
                if (samples.length > 8) samples.shift();
                const avgMbps = samples.reduce((a, b) => a + b) / samples.length;

                // Применяем коэффициент 0.9 для точности
                const finalDisplayMbps = (avgMbps * 0.9).toFixed(1);
                
                speedValue.innerText = finalDisplayMbps;
                updateGauge(finalDisplayMbps);
            }
        };

        xhr.onload = function() {
            statusText.innerText = "Test Complete";
            goButton.disabled = false;
            goButton.innerText = "RETRY";
            
            // Вибрация в Telegram по окончании
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }
        };

        xhr.onerror = function() {
            statusText.innerText = "Error: Connection Lost";
            goButton.disabled = false;
            goButton.innerText = "ERROR";
        };

        xhr.send();
    };

    // Старт приложения
    if (tg) {
        tg.expand();
        tg.ready();
    }
    
    // Загружаем инфо о сети сразу
    getNetworkData();
</script>
</body>
</html>
