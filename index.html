<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Скрипты лучше подключать перед body -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #020617; }
        body {
            background: radial-gradient(circle at center, #1e293b 0%, var(--bg) 100%);
            color: white; font-family: sans-serif; margin: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;
        }
        .gauge { position: relative; width: 250px; height: 250px; }
        svg { transform: rotate(-90deg); width: 100%; height: 100%; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 10; }
        .circle-fill {
            fill: none; stroke: var(--accent); stroke-width: 10;
            stroke-dasharray: 628; stroke-dashoffset: 628;
            transition: stroke-dashoffset 0.2s;
            filter: drop-shadow(0 0 8px var(--accent));
        }
        .info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        #speed { font-size: 3rem; font-weight: bold; margin: 0; color: var(--accent); }
        .chart-box { width: 85%; height: 120px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-top: 20px; padding: 10px; }
        .btn {
            margin-top: 30px; padding: 15px 60px; border-radius: 30px; border: none;
            background: var(--accent); color: #020617; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="gauge">
        <svg viewBox="0 0 220 220">
            <circle class="circle-bg" cx="110" cy="110" r="100"></circle>
            <circle id="progress" class="circle-fill" cx="110" cy="110" r="100"></circle>
        </svg>
        <div class="info">
            <div id="speed">0.0</div>
            <div style="opacity: 0.5">Mbps</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="chart"></canvas>
    </div>

    <button class="btn" id="btn" onclick="startTest()">ТЕСТ</button>

    <script>
        // 1. Инициализация переменных СРАЗУ
        let stats = [];
        let chart = null;
        
        // Ждем загрузки DOM и библиотек
        window.onload = () => {
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }

            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: Array(20).fill(''),
                    datasets: [{
                        data: stats,
                        borderColor: '#00d2ff',
                        backgroundColor: 'rgba(0, 210, 255, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: { x: { display: false }, y: { display: false } },
                    plugins: { legend: { display: false } }
                }
            });
        };

        async function startTest() {
            const btn = document.getElementById('btn');
            const speedEl = document.getElementById('speed');
            const progress = document.getElementById('progress');
            
            btn.disabled = true;
            btn.innerText = "ЗАМЕР...";
            stats.length = 0; // очистка графика

            try {
                // Пытаемся замерить по локальному файлу (ОБЯЗАТЕЛЬНО СОЗДАЙТЕ test.bin РЯДОМ)
                const response = await fetch('test.bin?v=' + Date.now());
                const reader = response.body.getReader();
                const startTime = performance.now();
                let received = 0;

                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    received += value.length;
                    
                    const duration = (performance.now() - startTime) / 1000;
                    const mbps = (received * 8 / (1024 * 1024)) / duration;

                    // Обновление UI
                    speedEl.innerText = mbps.toFixed(1);
                    progress.style.strokeDashoffset = 628 - (Math.min(mbps, 100) / 100 * 628);
                    
                    stats.push(mbps);
                    if(stats.length > 20) stats.shift();
                    chart.update('none'); // 'none' для производительности
                }
            } catch (e) {
                console.error(e);
                alert("Ошибка! Запустите через сервер (http://), а не файл (file://)");
            } finally {
                btn.disabled = false;
                btn.innerText = "ПОВТОРИТЬ";
            }
        }
    </script>
</body>
</html>
