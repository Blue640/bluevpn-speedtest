<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speedtest Mini App</title>
    <!-- Подключаем скрипты -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container { text-align: center; width: 90%; }
        .speed-value { font-size: 4rem; font-weight: bold; margin: 10px 0; color: #34c759; }
        .unit { font-size: 1.5rem; color: #8e8e93; }
        canvas { max-width: 100%; margin-top: 20px; }
        button {
            background-color: var(--tg-theme-button-color, #007aff);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="unit">Загрузка</div>
    <div class="speed-value" id="speed">0.0</div>
    <div class="unit">Mbps</div>
    
    <canvas id="speedChart"></canvas>
    
    <button id="startBtn">Начать тест</button>
</div>

<script>
    // Инициализация Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.expand(); // Развернуть на всё окно

    const speedEl = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const ctx = document.getElementById('speedChart').getContext('2d');

    // Настройка графика
    let chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Mbps',
                data: [],
                borderColor: '#34c759',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(52, 199, 89, 0.1)'
            }]
        },
        options: {
            scales: { y: { beginAtZero: true }, x: { display: false } },
            plugins: { legend: { display: false } }
        }
    });

    // Функция теста (симуляция реального замера)
    async function runTest() {
        startBtn.disabled = true;
        startBtn.innerText = "Тестирование...";
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        
        for (let i = 0; i < 20; i++) {
            await new Promise(r => setTimeout(r, 100));
            // Генерируем случайную скорость (здесь можно вставить fetch большого файла)
            const currentSpeed = (Math.random() * (350 - 300) + 300).toFixed(1);
            
            speedEl.innerText = currentSpeed;
            chart.data.labels.push("");
            chart.data.datasets[0].data.push(currentSpeed);
            chart.update();
        }

        startBtn.disabled = false;
        startBtn.innerText = "Повторить тест";
        
        // Вибрация по завершении
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
    }

    startBtn.onclick = runTest;
</script>

</body>
</html>
