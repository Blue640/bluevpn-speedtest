<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background-color: #0b0e14; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .gauge { width: 260px; height: 260px; border: 4px solid #1f262f; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #speedText { font-size: 5rem; font-weight: 900; color: #00d1ff; line-height: 1; transition: 0.1s; }
        .unit { color: #5a6575; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .btn { margin-top: 50px; background: #00d1ff; color: #000; border: none; padding: 20px 80px; border-radius: 40px; font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 0 20px rgba(0,209,255,0.2); }
        .btn:disabled { background: #1f262f; color: #444; box-shadow: none; }
        #status { margin-top: 15px; font-size: 0.7rem; color: #444; height: 20px; }
    </style>
</head>
<body>
    <div class="gauge">
        <span id="speedText">0.0</span>
        <div class="unit">Mbps</div>
    </div>
    <button class="btn" id="goBtn">START</button>
    <div id="status">Engine: Ready</div>

<script>
    const goBtn = document.getElementById('goBtn');
    const speedText = document.getElementById('speedText');
    const status = document.getElementById('status');

    goBtn.onclick = function() {
        goBtn.disabled = true;
        speedText.innerText = "0.0";
        status.innerText = "Testing...";

        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        
        // Сначала пробуем test.jpg, так как он больше и точнее
        xhr.open("GET", "test.jpg?nocache=" + Date.now(), true);
        
        xhr.onprogress = function(e) {
            if (e.loaded > 0) {
                const duration = (performance.now() - startTime) / 1000;
                const mbps = ((e.loaded * 8) / (1024 * 1024) / duration) * 0.96;
                speedText.innerText = mbps.toFixed(1);
            }
        };

        xhr.onload = function() {
            status.innerText = "Test Finished";
            finish();
        };

        xhr.onerror = function() {
            // Если JPG не сработал, пробуем BIN
            status.innerText = "Retrying with BIN...";
            runBackup();
        };

        xhr.send();
    };

    function runBackup() {
        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        xhr.open("GET", "test10mb.bin?t=" + Date.now(), true);
        xhr.onprogress = function(e) {
            if (e.loaded > 0) {
                const duration = (performance.now() - startTime) / 1000;
                const mbps = ((e.loaded * 8) / (1024 * 1024) / duration) * 0.96;
                speedText.innerText = mbps.toFixed(1);
            }
        };
        xhr.onload = finish;
        xhr.send();
    }

    function finish() {
        goBtn.disabled = false;
        goBtn.innerText = "RETRY";
        if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }
    }

    if(window.Telegram) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.ready();
    }
</script>
</body>
</html>
