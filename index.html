<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speedtest</title>
    <script src="https://telegram.org"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body {
            background-color: #0b0e14; /* Глубокий темный как на скрине */
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .speed-container {
            text-align: center;
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 2px solid #1f262f;
            border-radius: 50%;
        }
        .speed-value {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
        }
        .unit {
            color: #5a6575;
            font-size: 1.2rem;
        }
        canvas {
            position: absolute;
            top: 0; left: 0;
            z-index: -1;
        }
        .btn-start {
            margin-top: 40px;
            background: #00d1ff; /* Голубой акцент */
            color: #000;
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn-start:disabled { opacity: 0.3; }
    </style>
</head>
<body>

    <div class="speed-container">
        <div class="speed-value" id="speedText">0.0</div>
        <div class="unit">Mbps</div>
        <canvas id="speedChart"></canvas>
    </div>

    <button class="btn-start" id="startBtn">Старт</button>

<script>
    const tg = window.Telegram.WebApp;
    const speedText = document.getElementById('speedText');
    const startBtn = document.getElementById('startBtn');
    const ctx = document.getElementById('speedChart').getContext('2d');

    // Настройка графика (прозрачный фон, синяя линия)
    let chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#00d1ff',
                borderWidth: 2,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(0, 209, 255, 0.1)',
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { x: {display: false}, y: {display: false} },
            plugins: { legend: {display: false} }
        }
    });

    async function startSpeedTest() {
        startBtn.disabled = true;
        startBtn.innerText = "Тест...";
        
        // Сброс данных
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        chart.update();

        const TEST_FILE = "./test10mb.bin"; // Убедись, что файл лежит в корне гитхаба!
        const startTime = performance.now();

        try {
            const response = await fetch(TEST_FILE + "?t=" + Date.now());
            if (!response.ok) throw new Error();
            
            const reader = response.body.getReader();
            let received = 0;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                received += value.length;
                const now = performance.now();
                const duration = (now - startTime) / 1000;
                const mbps = ((received * 8) / (1024 * 1024) / duration).toFixed(1);
                
                speedText.innerText = mbps;
                
                // Обновляем график раз в 5 итераций, чтобы не висло
                if (chart.data.labels.length < 50) {
                    chart.data.labels.push("");
                    chart.data.datasets[0].data.push(mbps);
                    chart.update('none');
                }
            }
            
            startBtn.innerText = "Заново";
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        } catch (e) {
            alert("Файл test10mb.bin не найден в корне сайта!");
            startBtn.innerText = "Ошибка";
        }
        
        startBtn.disabled = false;
    }

    startBtn.onclick = startSpeedTest;
    tg.ready();
</script>
</body>
</html>
