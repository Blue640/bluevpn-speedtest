<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speedtest</title>
    <!-- Пытаемся загрузить, но если не выйдет — не страшно -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .speed-container {
            text-align: center;
            width: 250px;
            height: 250px;
            border: 2px solid #1f262f;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .speed-value { font-size: 3.5rem; font-weight: bold; }
        .unit { color: #5a6575; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .btn-start {
            margin-top: 50px;
            background: #00d1ff;
            color: #000;
            border: none;
            padding: 15px 60px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10; /* Кнопка точно сверху */
        }
        .btn-start:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div class="speed-container">
        <div class="speed-value" id="speedText">0.0</div>
        <div class="unit">Mbps</div>
        <canvas id="speedChart"></canvas>
    </div>

    <button class="btn-start" id="startBtn">СТАРТ</button>

<script>
    // 1. Сначала вешаем событие на кнопку, чтобы она работала СРАЗУ
    const startBtn = document.getElementById('startBtn');
    const speedText = document.getElementById('speedText');

    startBtn.addEventListener('click', function() {
        console.log("Кнопка нажата!");
        runTest();
    });

    // 2. Безопасная инициализация графиков и ТГ
    let chart = null;
    try {
        if (typeof Chart !== 'undefined') {
            const ctx = document.getElementById('speedChart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{ data: [], borderColor: '#00d1ff', tension: 0.4, pointRadius: 0 }] },
                options: { scales: { x: {display: false}, y: {display: false} }, plugins: {legend: {display: false}} }
            });
        }
    } catch (e) { console.error("Chart error", e); }

    const tg = window.Telegram ? window.Telegram.WebApp : null;
    if (tg) { tg.expand(); tg.ready(); }

    // 3. Функция теста
    async function runTest() {
        startBtn.disabled = true;
        startBtn.innerText = "ЗАМЕР...";
        
        // Ссылка на файл (обязательно проверь, что он есть в корне GitHub!)
        const TEST_FILE = "test10mb.bin"; 
        
        try {
            const startTime = performance.now();
            const response = await fetch(TEST_FILE + "?t=" + Date.now());
            
            if (!response.ok) throw new Error("File not found");

            const reader = response.body.getReader();
            let received = 0;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                received += value.length;
                const now = performance.now();
                const mbps = ((received * 8) / (1024 * 1024) / ((now - startTime) / 1000)).toFixed(1);
                
                speedText.innerText = mbps;

                if (chart) {
                    chart.data.labels.push("");
                    chart.data.datasets[0].data.push(mbps);
                    chart.update('none');
                }
            }
            startBtn.innerText = "ГОТОВО";
        } catch (e) {
            alert("Ошибка: Загрузи файл test10mb.bin в репозиторий!");
            startBtn.innerText = "ОШИБКА";
        }
        
        startBtn.disabled = false;
        if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
    }
</script>
</body>
</html>
