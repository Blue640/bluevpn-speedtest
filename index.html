<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00d1ff; --text: #ffffff; --sec: #1f262f; --gray: #5a6575; }
        body { background-color: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; overflow: hidden; }
        
        .gauge-wrapper { position: relative; width: 300px; height: 180px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .gauge-bg { position: absolute; width: 260px; height: 260px; border: 15px solid var(--sec); border-radius: 50%; border-bottom-color: transparent; top: 0; transform: rotate(-45deg); }
        .gauge-fill { position: absolute; width: 260px; height: 260px; border: 15px solid var(--accent); border-radius: 50%; border-bottom-color: transparent; border-left-color: transparent; border-right-color: transparent; top: 0; transform: rotate(-135deg); transition: transform 0.3s ease-out; z-index: 2; }
        
        .speed-info { text-align: center; z-index: 10; padding-bottom: 10px; }
        #speedValue { font-size: 5rem; font-weight: 900; color: var(--text); line-height: 1; }
        .unit { color: var(--gray); font-size: 1.2rem; font-weight: bold; }

        .network-card { width: 100%; max-width: 320px; background: var(--sec); border-radius: 20px; padding: 15px; margin-top: 20px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; }
        .info-row:last-child { border-bottom: none; }
        .label { color: var(--gray); text-transform: uppercase; font-size: 0.7rem; }

        .btn-start { margin-top: 30px; background: var(--accent); color: #000; border: none; width: 100%; max-width: 250px; height: 60px; border-radius: 30px; font-size: 1.2rem; font-weight: 900; cursor: pointer; }
        .btn-start:disabled { opacity: 0.4; }
    </style>
</head>
<body>

    <div class="gauge-wrapper">
        <div class="gauge-bg"></div>
        <div class="gauge-fill" id="gaugeProgress"></div>
        <div class="speed-info">
            <span id="speedValue">0.0</span>
            <div class="unit">Mbps</div>
        </div>
    </div>

    <div class="network-card">
        <div class="info-row"><span class="label">IP Address</span><span id="uIp">...</span></div>
        <div class="info-row"><span class="label">Provider</span><span id="uIsp">...</span></div>
    </div>

    <button class="btn-start" id="goBtn">START</button>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    const speedValue = document.getElementById('speedValue');
    const gaugeProgress = document.getElementById('gaugeProgress');
    const goBtn = document.getElementById('goBtn');

    function updateGauge(mbps) {
        const degrees = -135 + (Math.min(mbps, 100) * 1.8);
        gaugeProgress.style.transform = `rotate(${degrees}deg)`;
    }

    async function getNetwork() {
        try {
            const res = await fetch('https://ipapi.co');
            const d = await res.json();
            document.getElementById('uIp').innerText = d.ip;
            document.getElementById('uIsp').innerText = d.org;
        } catch (e) { document.getElementById('uIp').innerText = "Network Error"; }
    }

    goBtn.onclick = async function() {
        goBtn.disabled = true;
        speedValue.innerText = "0.0";
        updateGauge(0);

        // Используем один самый большой файл
        const TEST_FILE = "test1.jpg"; 
        const startTime = performance.now();
        let lastUpdate = startTime;

        try {
            const response = await fetch(TEST_FILE + "?t=" + Date.now());
            const reader = response.body.getReader();
            let loaded = 0;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                loaded += value.length;
                const now = performance.now();
                
                // Обновляем раз в 200мс, чтобы не «душить» поток вычислениями
                if (now - lastUpdate > 200) {
                    const duration = (now - startTime) / 1000;
                    // Рассчитываем Mbps БЕЗ понижающих коэффициентов, чтобы увидеть максимум
                    const mbps = ((loaded * 8) / (1024 * 1024) / duration);
                    
                    speedValue.innerText = mbps.toFixed(1);
                    updateGauge(mbps);
                    lastUpdate = now;
                }
            }
        } catch(e) { alert("Ошибка замера"); }

        goBtn.disabled = false;
        goBtn.innerText = "RETRY";
        if (tg) tg.HapticFeedback.notificationOccurred('success');
    };

    if (tg) { tg.expand(); tg.ready(); }
    getNetwork();
</script>
</body>
</html>
