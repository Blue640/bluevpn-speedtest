<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest Pro</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00d1ff; --text: #ffffff; --sec: #1f262f; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        
        /* Спидометр */
        .gauge { width: 240px; height: 240px; border: 4px solid var(--sec); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: 0.3s; box-shadow: 0 0 20px rgba(0,209,255,0.05); }
        .gauge.active { border-color: var(--accent); box-shadow: 0 0 40px rgba(0, 209, 255, 0.2); }
        #speedText { font-size: 5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .unit { color: #5a6575; font-size: 1.1rem; font-weight: bold; }

        /* Инфо-панель */
        .info-panel { width: 100%; max-width: 320px; margin-top: 30px; background: var(--sec); border-radius: 20px; padding: 15px; display: grid; gap: 10px; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.85rem; border-bottom: 1px solid #2c3641; padding-bottom: 5px; }
        .info-row:last-child { border: none; }
        .label { color: #5a6575; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; }
        .value { font-weight: 600; color: #fff; }

        .btn { margin-top: 40px; background: var(--accent); color: #000; border: none; width: 100%; max-width: 250px; padding: 18px; border-radius: 35px; font-weight: 900; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

    <div class="gauge" id="mainGauge">
        <span id="speedText">0.0</span>
        <div class="unit">Mbps</div>
    </div>

    <div class="info-panel">
        <div class="info-row">
            <span class="label">IP Address</span>
            <span class="value" id="ip">—</span>
        </div>
        <div class="info-row">
            <span class="label">Location</span>
            <span class="value" id="loc">—</span>
        </div>
        <div class="info-row">
            <span class="label">Provider</span>
            <span class="value" id="isp">—</span>
        </div>
    </div>

    <button class="btn" id="goBtn">START TEST</button>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    const speedText = document.getElementById('speedText');
    const goBtn = document.getElementById('goBtn');
    const gauge = document.getElementById('mainGauge');

    // 1. Получаем данные об IP при старте
    async function fetchIPInfo() {
        try {
            const res = await fetch('http://ip-api.com');
            const data = await res.json();
            if (data.status === 'success') {
                document.getElementById('ip').innerText = data.query;
                document.getElementById('loc').innerText = data.city + ', ' + data.country;
                document.getElementById('isp').innerText = data.isp;
            }
        } catch (e) { console.error("IP Info failed", e); }
    }

    goBtn.onclick = function() {
        goBtn.disabled = true;
        gauge.classList.add('active');
        speedText.innerText = "0.0";

        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        
        // Используем test.jpg, так как он больше
        xhr.open("GET", "test.jpg?t=" + Date.now(), true);
        
        xhr.onprogress = function(e) {
            if (e.loaded > 0) {
                const duration = (performance.now() - startTime) / 1000;
                // Считаем Mbps с коррекцией на накладные расходы VPN
                const mbps = ((e.loaded * 8) / (1024 * 1024) / duration) * 0.95;
                speedText.innerText = mbps.toFixed(1);
            }
        };

        xhr.onload = function() {
            gauge.classList.remove('active');
            goBtn.disabled = false;
            goBtn.innerText = "RETRY";
            if (tg) tg.HapticFeedback.notificationOccurred('success');
        };

        xhr.send();
    };

    // Инициализация
    if (tg) { tg.expand(); tg.ready(); }
    fetchIPInfo();
</script>
</body>
</html>
