<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest Ultra</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00d1ff; --text: #ffffff; --sec: #1f262f; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .gauge { width: 260px; height: 260px; border: 4px solid var(--sec); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #speedText { font-size: 5rem; font-weight: 900; color: var(--accent); line-height: 1; }
        .unit { color: #5a6575; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }
        .stats { display: flex; gap: 12px; margin-top: 35px; width: 300px; }
        .stat-card { background: var(--sec); flex: 1; padding: 12px; border-radius: 15px; text-align: center; }
        .stat-label { font-size: 0.65rem; color: #5a6575; text-transform: uppercase; display: block; }
        .stat-val { font-size: 1.2rem; font-weight: bold; }
        .btn { margin-top: 45px; background: var(--accent); color: #000; border: none; padding: 20px 80px; border-radius: 40px; font-weight: 900; font-size: 1.1rem; cursor: pointer; }
        .btn:disabled { background: #1f262f; color: #444; }
        #status { margin-top: 15px; font-size: 0.7rem; color: #333; }
    </style>
</head>
<body>
    <div class="gauge">
        <span id="speedText">0.0</span>
        <div class="unit">Mbps</div>
    </div>
    <div class="stats">
        <div class="stat-card"><span class="stat-label">Ping</span><span class="stat-val" id="p">0</span></div>
        <div class="stat-card"><span class="stat-label">Jitter</span><span class="stat-val" id="j">0</span></div>
    </div>
    <button class="btn" id="goBtn">START TEST</button>
    <div id="status">Global Server Engine</div>

<script>
    const goBtn = document.getElementById('goBtn');
    const speedText = document.getElementById('speedText');
    const status = document.getElementById('status');

    // Прямая ссылка на быстрый файл Cloudflare (100MB)
    // Мы используем HTTPS, чтобы не было ошибок безопасности
    const TEST_URL = "https://speed.cloudflare.com";

    async function measurePing() {
        let results = [];
        for(let i=0; i<4; i++){
            let s = performance.now();
            // Пингуем гугл или сам файл
            await fetch("https://1.1.1.1", {mode:'no-cors', cache:'no-store'}).catch(()=>{});
            results.push(performance.now()-s);
        }
        return { p: Math.min(...results).toFixed(0), j: (Math.max(...results) - Math.min(...results)).toFixed(0) };
    }

    goBtn.onclick = async function() {
        goBtn.disabled = true;
        speedText.innerText = "0.0";
        status.innerText = "Connecting to Global Node...";
        
        const lat = await measurePing();
        document.getElementById('p').innerText = lat.p;
        document.getElementById('j').innerText = lat.j;

        status.innerText = "Testing via Cloudflare Edge...";
        
        let totalBytes = 0;
        const startTime = performance.now();
        let lastUpdate = startTime;

        try {
            // Используем 2 параллельных потока к Cloudflare для точности
            const startThread = async () => {
                const response = await fetch(TEST_URL + "&t=" + Math.random());
                const reader = response.body.getReader();
                while (true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    totalBytes += value.length;
                    const now = performance.now();
                    if (now - lastUpdate > 120) {
                        const duration = (now - startTime) / 1000;
                        // Считаем Mbps. Cloudflare отдает чисто, коэффициент 0.95
                        const mbps = ((totalBytes * 8) / (1024 * 1024) / duration) * 0.95;
                        speedText.innerText = mbps.toFixed(1);
                        lastUpdate = now;
                    }
                }
            };

            await Promise.all([startThread(), startThread()]);

        } catch (e) {
            console.error(e);
            status.innerText = "Error: Use a browser with CORS support";
        }

        const finalDuration = (performance.now() - startTime) / 1000;
        const finalMbps = ((totalBytes * 8) / (1024 * 1024) / finalDuration) * 0.95;
        speedText.innerText = finalMbps.toFixed(1);
        status.innerText = "Test Finished";
        goBtn.disabled = false;
        goBtn.innerText = "RETRY";

        if(window.Telegram && window.Telegram.WebApp.HapticFeedback) {
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        }
    };
</script>
</body>
</html>
