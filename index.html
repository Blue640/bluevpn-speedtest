<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speedtest Mini App</title>
    <!-- Подключаем SDK Telegram и Chart.js -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        :root {
            --bg-color: #1c1c1e;
            --text-color: #ffffff;
            --accent-color: #34c759;
            --button-color: #007aff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--tg-theme-bg-color, var(--bg-color));
            color: var(--tg-theme-text-color, var(--text-color));
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .speed-value {
            font-size: 5rem;
            font-weight: 800;
            margin: 10px 0;
            color: var(--accent-color);
            line-height: 1;
        }
        .unit { font-size: 1.2rem; color: #8e8e93; font-weight: 500; }
        .chart-container { width: 100%; height: 150px; margin-top: 20px; }
        button {
            background-color: var(--tg-theme-button-color, var(--button-color));
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: opacity 0.2s;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <div class="unit">Download</div>
    <div class="speed-value" id="speed">0.0</div>
    <div class="unit">Mbps</div>
    
    <div class="chart-container">
        <canvas id="speedChart"></canvas>
    </div>
    
    <button id="startBtn">START TEST</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const speedEl = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const ctx = document.getElementById('speedChart').getContext('2d');

    let chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                data: [],
                borderColor: '#34c759',
                borderWidth: 3,
                tension: 0.4,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(52, 199, 89, 0.1)'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: { 
                y: { display: false, beginAtZero: true }, 
                x: { display: false } 
            },
            plugins: { legend: { display: false } }
        }
    });

    async function runTest() {
        startBtn.disabled = true;
        startBtn.innerText = "TESTING...";
        
        // Сбрасываем график
        chart.data.labels = [];
        chart.data.datasets[0].data = [];
        chart.update();

        // Укажите здесь имя вашего файла на GitHub (10MB-100MB)
        const TEST_FILE_URL = "./test10mb.bin"; 
        
        const startTime = performance.now();
        let lastUpdateTime = startTime;

        try {
            const response = await fetch(TEST_FILE_URL + "?nocache=" + Date.now());
            if (!response.ok) throw new Error('File not found');
            
            const reader = response.body.getReader();
            let loadedBytes = 0;

            while (true) {
                const {done, value} = await reader.read();
                if (done) break;
                
                loadedBytes += value.length;
                const now = performance.now();
                
                // Обновляем график каждые 100мс, чтобы не тормозило
                if (now - lastUpdateTime > 100) {
                    const durationInSeconds = (now - startTime) / 1000;
                    const mbps = ((loadedBytes * 8) / (1024 * 1024) / durationInSeconds).toFixed(1);
                    
                    speedEl.innerText = mbps;
                    chart.data.labels.push("");
                    chart.data.datasets[0].data.push(mbps);
                    chart.update('none');
                    lastUpdateTime = now;
                }
            }

            const totalDuration = (performance.now() - startTime) / 1000;
            const finalMbps = ((loadedBytes * 8) / (1024 * 1024) / totalDuration).toFixed(1);
            
            speedEl.innerText = finalMbps;
            startBtn.innerText = "RETRY";
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');

        } catch (e) {
            console.error(e);
            alert("Ошибка: Убедитесь, что файл test10mb.bin загружен на GitHub");
            startBtn.innerText = "ERROR";
        }
        
        startBtn.disabled = false;
    }

    startBtn.onclick = runTest;
</script>

</body>
</html>
