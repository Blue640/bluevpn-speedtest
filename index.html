<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlueVPN Speedtest</title>
    <script src="https://telegram.org"></script>
    <style>
        :root { --bg: #0b0e14; --accent: #00d1ff; --text: #ffffff; --sec: #1f262f; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        /* Контейнер спидометра */
        .gauge-container { position: relative; width: 300px; height: 200px; display: flex; align-items: flex-end; justify-content: center; overflow: hidden; }
        .gauge-arc { width: 280px; height: 280px; border: 15px solid var(--sec); border-radius: 50%; border-bottom-color: transparent; position: absolute; top: 0; transform: rotate(-45deg); }
        .gauge-fill { width: 280px; height: 280px; border: 15px solid var(--accent); border-radius: 50%; border-bottom-color: transparent; border-left-color: transparent; border-right-color: transparent; position: absolute; top: 0; transform: rotate(-135deg); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        /* Цифры */
        .speed-display { text-align: center; z-index: 5; margin-bottom: 10px; }
        #speedText { font-size: 4.5rem; font-weight: 900; color: var(--text); line-height: 1; display: block; }
        .unit { color: #5a6575; font-size: 1.2rem; font-weight: bold; }

        /* Инфо-панель */
        .info-card { width: 100%; max-width: 320px; background: var(--sec); border-radius: 20px; padding: 15px; margin-top: 30px; }
        .info-line { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 6px 0; border-bottom: 1px solid #2c3641; }
        .info-line:last-child { border: none; }
        .label { color: #5a6575; text-transform: uppercase; }

        .btn { margin-top: 40px; background: var(--accent); color: #000; border: none; width: 100%; max-width: 260px; padding: 20px; border-radius: 40px; font-weight: 900; font-size: 1.1rem; cursor: pointer; box-shadow: 0 5px 20px rgba(0,209,255,0.2); }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="gauge-container">
        <div class="gauge-arc"></div>
        <div class="gauge-fill" id="gaugeFill"></div>
        <div class="speed-display">
            <span id="speedText">0.0</span>
            <div class="unit">Mbps</div>
        </div>
    </div>

    <div class="info-card">
        <div class="info-line"><span class="label">IP Address</span><span id="ip">—</span></div>
        <div class="info-line"><span class="label">Provider</span><span id="isp">—</span></div>
    </div>

    <button class="btn" id="goBtn">НАЧАТЬ ТЕСТ</button>

<script>
    const tg = window.Telegram ? window.Telegram.WebApp : null;
    const speedText = document.getElementById('speedText');
    const gaugeFill = document.getElementById('gaugeFill');
    const goBtn = document.getElementById('goBtn');

    // Настройка шкалы: 0 Mbps = -135deg, 100 Mbps = 45deg
    function updateGauge(mbps) {
        let rotation = -135 + (Math.min(mbps, 100) * 1.8);
        gaugeFill.style.transform = `rotate(${rotation}deg)`;
    }

    // Информация о сети
    async function getNetwork() {
        try {
            const r = await fetch('http://ip-api.com');
            const d = await r.json();
            document.getElementById('ip').innerText = d.query;
            document.getElementById('isp').innerText = d.isp;
        } catch(e) {}
    }

    goBtn.onclick = function() {
        goBtn.disabled = true;
        speedText.innerText = "0.0";
        updateGauge(0);

        const xhr = new XMLHttpRequest();
        const startTime = performance.now();
        let samples = []; // Храним последние замеры для усреднения

        xhr.open("GET", "test.jpg?t=" + Date.now(), true);
        
        xhr.onprogress = function(e) {
            if (e.loaded > 0) {
                const now = performance.now();
                const duration = (now - startTime) / 1000;
                const currentMbps = ((e.loaded * 8) / (1024 * 1024) / duration);
                
                // Усреднение: берем среднее между текущим и последним замером
                samples.push(currentMbps);
                if(samples.length > 5) samples.shift();
                const avgMbps = samples.reduce((a,b) => a+b) / samples.length;

                // Применяем коэффициент точности (чтобы не завышало из-за кэша браузера)
                const realMbps = (avgMbps * 0.85).toFixed(1); 
                
                speedText.innerText = realMbps;
                updateGauge(realMbps);
            }
        };

        xhr.onload = function() {
            goBtn.disabled = false;
            goBtn.innerText = "ПОВТОРИТЬ";
            if(tg) tg.HapticFeedback.notificationOccurred('success');
        };

        xhr.send();
    };

    if(tg) { tg.expand(); tg.ready(); }
    getNetwork();
</script>
</body>
</html>
